  <path d="M0 658C220 622 444 616 640 644C845 673 1056 687 1280 649V760H0V658Z" fill="#091f2e"/>
  <path d="M40 690h160M272 690h190M544 690h130M760 690h210M1050 690h164" stroke="#d8ffff" stroke-opacity=".55" stroke-width="9" stroke-linecap="round"/>
