<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff8ff"/>
      <stop offset="0.52" stop-color="#f1fff8"/>
      <stop offset="1" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="body" x1="282" y1="315" x2="922" y2="605" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0096ff"/>
      <stop offset="0.5" stop-color="#00c7be"/>
      <stop offset="1" stop-color="#2ed56d"/>
    </linearGradient>
    <linearGradient id="cab" x1="780" y1="315" x2="1040" y2="580">
      <stop offset="0" stop-color="#0b86ff"/>
      <stop offset="0.62" stop-color="#00a99d"/>
      <stop offset="1" stop-color="#2ed56d"/>
    </linearGradient>
    <linearGradient id="glass" x1="365" y1="287" x2="865" y2="585">
      <stop offset="0" stop-color="#e8ffff" stop-opacity="0.92"/>
      <stop offset="0.42" stop-color="#7fe7ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1f6fd6" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="window" x1="862" y1="319" x2="1010" y2="410">
      <stop offset="0" stop-color="#ecffff"/>
      <stop offset="1" stop-color="#7ee5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#06202e" flood-opacity="0.22"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="solar" width="58" height="44" patternUnits="userSpaceOnUse">
      <rect width="58" height="44" fill="#0b74de"/>
      <path d="M0 0h58M0 22h58M29 0v44" stroke="#d8ffff" stroke-opacity=".35" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1280" height="760" rx="46" fill="url(#sky)"/>
  <circle cx="1010" cy="150" r="100" fill="#fff8bf" opacity=".65"/>
  <path d="M0 558C150 496 282 500 412 527C582 562 735 607 905 548C1068 491 1175 483 1280 520V760H0V558Z" fill="#d7f8e5"/>
  <path d="M0 612C185 555 294 585 447 609C616 635 738 642 880 596C1036 545 1162 535 1280 571V760H0V612Z" fill="#bdeed2"/>

  <!-- DC monuments and skyline -->
  <g opacity=".9">
    <rect x="90" y="342" width="68" height="160" rx="10" fill="#b8d9d6"/>
    <rect x="180" y="312" width="44" height="190" rx="8" fill="#9dcad0"/>
    <rect x="248" y="365" width="58" height="137" rx="10" fill="#b8d9d6"/>
    <rect x="1002" y="330" width="66" height="172" rx="9" fill="#a7d7d0"/>
    <rect x="1101" y="357" width="48" height="145" rx="8" fill="#b7dad5"/>
    <path d="M628 184L648 502H608L628 184Z" fill="#d9f3f2"/>
    <rect x="619" y="245" width="18" height="256" fill="#c4e4e4"/>
    <path d="M730 415c0-48 38-86 86-86s86 38 86 86v88H730v-88Z" fill="#cfe8e3"/>
    <path d="M704 503h224v30H704z" fill="#b7d8d2"/>
    <path d="M704 418h224" stroke="#eaffff" stroke-width="8"/>
    <rect x="770" y="390" width="92" height="113" fill="#eaf8f5" opacity=".65"/>
    <path d="M410 360h120v143H410z" fill="#b4d6d4"/>
    <path d="M470 285l25 75h-50l25-75Z" fill="#b4d6d4"/>
  </g>

  <g filter="url(#soft)" opacity=".38">
