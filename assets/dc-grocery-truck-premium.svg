    <circle cx="114" cy="229" r="8" fill="#00c7be"/>
    <circle cx="1116" cy="238" r="6" fill="#30d158"/>
    <circle cx="228" cy="189" r="5" fill="#0a84ff"/>
    <circle cx="1024" cy="156" r="4" fill="#0a84ff"/>
  </g>
</svg>