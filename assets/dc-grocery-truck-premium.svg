  </g>

  <!-- electric truck -->
  <g filter="url(#shadow)">
    <!-- cargo box -->
    <path d="M238 303c0-35 28-63 63-63h510c28 0 50 22 50 50v222c0 31-25 56-56 56H301c-35 0-63-28-63-63V303Z" fill="url(#body)"/>
    <path d="M278 282h523c22 0 40 18 40 40v160c0 22-18 40-40 40H278V282Z" fill="url(#glass)" stroke="#d9ffff" stroke-opacity=".6" stroke-width="4"/>
    <path d="M305 305h500v48H305z" fill="url(#solar)" opacity=".9"/>
    <path d="M305 353h500v170H305z" fill="#edffff" opacity=".18"/>
    <path d="M305 353h500M405 353v170M505 353v170M605 353v170M705 353v170M805 353v170" stroke="#e7ffff" stroke-opacity=".36" stroke-width="3"/>
    <path d="M310 285c76 92 270 190 512 196" stroke="#ffffff" stroke-opacity=".22" stroke-width="18" stroke-linecap="round"/>

    <!-- visible food boxes inside transparent cargo -->
    <g opacity=".98">
      <rect x="332" y="385" width="80" height="62" rx="14" fill="#ffbd4a"/>
      <rect x="426" y="381" width="82" height="66" rx="14" fill="#72d66c"/>
      <rect x="525" y="388" width="78" height="60" rx="14" fill="#ff6b59"/>
      <rect x="622" y="382" width="78" height="66" rx="14" fill="#ffd60a"/>
      <rect x="717" y="390" width="68" height="58" rx="14" fill="#8ce99a"/>
      <path d="M355 392c18-27 47-9 39 17c-8 29-50 26-48 0c1-9 4-14 9-17Z" fill="#e2342c"/>
      <path d="M455 396c24-28 49-1 33 29c-16 28-57 19-48-12c3-8 7-14 15-17Z" fill="#2fb344"/>
      <circle cx="545" cy="416" r="17" fill="#ff9f0a"/>
      <circle cx="570" cy="416" r="17" fill="#ff9f0a"/>
      <path d="M644 394c14 9 33 9 46 0c7 42-53 43-46 0Z" fill="#2f9e44"/>
      <rect x="734" y="402" width="34" height="24" rx="12" fill="#ffffff" opacity=".75"/>
      <rect x="354" y="461" width="392" height="28" rx="14" fill="#082233" opacity=".2"/>
    </g>

    <!-- cab -->
    <path d="M820 333h116c37 0 70 20 87 53l55 108c10 20-4 44-27 44H820V333Z" fill="url(#cab)"/>
    <path d="M864 360h67c18 0 35 10 43 26l29 57H864V360Z" fill="url(#window)" stroke="#eaffff" stroke-width="5"/>
    <path d="M1018 485h46" stroke="#eaffff" stroke-width="8" stroke-linecap="round"/>
    <rect x="837" y="466" width="62" height="30" rx="15" fill="#061922" opacity=".34"/>
    <path d="M841 331h-42v207h42V331Z" fill="#0a4c63" opacity=".55"/>
    <path d="M899 336c13 46 50 95 116 137" stroke="#ffffff" opacity=".22" stroke-width="14" stroke-linecap="round"/>

    <!-- branding -->
    <rect x="342" y="250" width="265" height="66" rx="22" fill="white" opacity=".93"/>
    <text x="372" y="291" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="29" font-weight="900" fill="#005a5d">Meals on Wheels</text>
    <text x="373" y="312" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="15" font-weight="800" fill="#3e8e3c">DC campus grocery</text>
    <circle cx="639" cy="283" r="45" fill="white" opacity=".96"/>
    <path d="M647 244l-42 51h31l-9 35l42-52h-30l8-34Z" fill="#00a99d"/>
    <path d="M606 241c-34-39-68-54-104-42c30 10 42 30 47 57c18-16 37-20 57-15Z" fill="#42b84a"/>
    <path d="M647 236c18-50 49-79 95-88c-8 39-34 63-95 88Z" fill="#2f9e44"/>

    <!-- wheels -->
    <g>
      <circle cx="395" cy="551" r="72" fill="#071f2e"/>
      <circle cx="395" cy="551" r="42" fill="#f0fbff"/>
      <circle cx="395" cy="551" r="19" fill="#00a99d"/>
      <circle cx="850" cy="551" r="72" fill="#071f2e"/>
      <circle cx="850" cy="551" r="42" fill="#f0fbff"/>
      <circle cx="850" cy="551" r="19" fill="#00a99d"/>
      <circle cx="992" cy="551" r="61" fill="#071f2e"/>
      <circle cx="992" cy="551" r="34" fill="#f0fbff"/>
      <circle cx="992" cy="551" r="15" fill="#00a99d"/>
