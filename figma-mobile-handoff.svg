    <text x="34" y="452" class="small teal">Red lentils • Chickpeas • Brown rice • Baby spinach</text>
    <text x="34" y="486" class="bodyBold navy">$9.49</text>
    <rect x="278" y="466" width="72" height="34" rx="17" class="blue"/><text x="305" y="487" class="small white">Add</text>

    <rect x="20" y="526" width="350" height="138" class="surface card"/>
    <text x="34" y="554" class="bodyBold navy">Senior wellness pack vegetarian</text>
    <text x="34" y="574" class="small muted">2-person senior bundle • Vegetarian • 8 portions</text>
    <text x="34" y="606" class="small teal">Oats • Milk • Egg protein items • Sweet potatoes</text>
    <text x="34" y="640" class="bodyBold navy">$10.49</text>

    <rect x="20" y="680" width="350" height="138" class="surface card"/>
    <text x="34" y="708" class="bodyBold navy">Family support pack non-veg</text>
    <text x="34" y="728" class="small muted">4-person family bundle • Non-veg • 14 portions</text>
    <text x="34" y="760" class="small teal">Chicken packs • Rice • Beans • Bell peppers • Broccoli</text>
    <text x="34" y="794" class="bodyBold navy">$23.99</text>
  </g>

  <!-- Screen 4 -->
  <g transform="translate(1330 40)">
    <rect width="390" height="844" rx="34" class="bg"/>
    <rect width="390" height="70" rx="34" class="surface"/>
