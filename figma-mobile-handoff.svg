    <text x="34" y="358" class="label muted">Pickup pit stop</text>
    <rect x="34" y="368" width="322" height="46" rx="16" class="mint"/>
    <text x="48" y="396" class="body muted">Foggy Bottom West Hub (20052)</text>
    <text x="34" y="438" class="label muted">Name</text>
    <rect x="34" y="448" width="322" height="46" rx="16" class="surface"/>
    <text x="48" y="476" class="body muted">Your name</text>

    <rect x="20" y="520" width="350" height="130" class="soft card"/>
    <text x="34" y="548" class="bodyBold navy">Nutrition coach</text>
    <text x="34" y="572" class="body muted">This basket is short on protein. Add salmon, tuna, turkey, eggs, chicken, tofu, or lentils.</text>
    <rect x="34" y="590" width="88" height="24" class="surface pill"/><text x="48" y="606" class="small navy">34g protein</text>

    <rect x="20" y="670" width="350" height="116" class="surface card"/>
    <text x="34" y="700" class="body muted">Items</text><text x="318" y="700" class="bodyBold navy">7</text>
    <text x="34" y="724" class="body muted">Subtotal</text><text x="292" y="724" class="bodyBold navy">$23.45</text>
    <text x="34" y="748" class="body muted">Pit stop pickup</text><text x="306" y="748" class="bodyBold navy">Free</text>
    <rect x="34" y="760" width="302" height="40" rx="20" class="blue"/><text x="141" y="785" class="bodyBold white">Place pickup order</text>
  </g>

  <!-- Screen 5 -->
  <g transform="translate(1760 40)">
    <rect width="390" height="844" rx="34" class="bg"/>
    <rect width="390" height="70" rx="34" class="surface"/>
    <text x="24" y="42" class="bodyBold navy">Coverage</text>
    <text x="20" y="108" class="label teal">Coverage</text>
    <text x="20" y="142" class="screenTitle navy">Find the pit stop closest to you.</text>
    <text x="20" y="166" class="body muted">Every marker shows a live pickup point with neighborhood, service type, and hours.</text>
    <rect x="20" y="194" width="350" height="360" class="surface card"/>
    <text x="145" y="380" class="screenTitle navy">Leaflet map</text>
    <text x="94" y="406" class="body muted">DC pit stops + 1-mile service areas</text>
    <rect x="20" y="572" width="350" height="64" class="surface card"/>
    <text x="34" y="598" class="small muted">Pit stop location • 1-mile service radius • Tap marker for details</text>
  </g>

  <!-- Notes -->
  <g transform="translate(2190 70)">
    <text x="0" y="0" class="screenTitle navy">Import to Figma</text>
    <text x="0" y="34" class="body muted">1. Open Figma</text>
    <text x="0" y="56" class="body muted">2. Drag this SVG into a new file</text>
    <text x="0" y="78" class="body muted">3. Use each phone frame as a starting artboard</text>
    <text x="0" y="100" class="body muted">4. Replace placeholder blocks with final images/components</text>
  </g>
</svg>
