<svg width="2550" height="980" viewBox="0 0 2550 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #F6FBF9; }
      .surface { fill: #FFFFFF; stroke: rgba(16,34,40,.10); stroke-width: 1; }
      .mint { fill: #EAF7F1; }
      .soft { fill: #F3FBF7; }
      .navy { fill: #102228; }
      .muted { fill: #5A7078; }
      .teal { fill: #1E8B78; }
      .blue { fill: #2EA7FF; }
      .white { fill: #FFFFFF; }
      .pill { rx: 18; ry: 18; }
      .card { rx: 24; ry: 24; }
      .small { font: 600 12px Manrope, Arial, sans-serif; }
      .label { font: 800 11px Manrope, Arial, sans-serif; letter-spacing: .08em; text-transform: uppercase; }
      .body { font: 500 14px Manrope, Arial, sans-serif; }
      .bodyBold { font: 700 14px Manrope, Arial, sans-serif; }
      .title { font: 700 18px Fraunces, Georgia, serif; }
      .hero { font: 700 34px Fraunces, Georgia, serif; }
      .screenTitle { font: 700 22px Fraunces, Georgia, serif; }
    </style>
  </defs>

  <rect width="2550" height="980" fill="#EEF6F3"/>

  <!-- Screen 1 -->
  <g transform="translate(40 40)">
    <rect width="390" height="844" rx="34" class="bg"/>
    <rect x="0" y="0" width="390" height="70" rx="34" class="surface"/>
    <text x="24" y="42" class="bodyBold navy">Meals on Wheels DC</text>
    <rect x="278" y="18" width="88" height="34" class="surface pill"/>
    <text x="300" y="40" class="small navy">Cart (7)</text>

    <rect x="20" y="92" width="198" height="28" rx="14" class="surface"/>
    <text x="34" y="110" class="label teal">Neighborhood-first grocery access</text>
    <text x="20" y="165" class="hero navy">Fresh food</text>
    <text x="20" y="205" class="hero navy">support for</text>
    <text x="20" y="245" class="hero teal">DC households.</text>
    <text x="20" y="285" class="body muted">Shop affordable groceries, produce, meal packs, and weekly</text>
    <text x="20" y="305" class="body muted">support bundles matched to the pickup pit stop closest to you.</text>

    <rect x="20" y="330" width="160" height="46" rx="23" class="blue"/>
    <text x="42" y="358" class="bodyBold white">Shop the catalog</text>
    <rect x="192" y="330" width="160" height="46" class="surface pill"/>
    <text x="222" y="358" class="bodyBold navy">Find a pit stop</text>

    <rect x="20" y="398" width="350" height="210" class="surface card"/>
    <text x="42" y="505" class="screenTitle navy">Hero image</text>
    <text x="42" y="530" class="body muted">Truck + refrigerated lens + pit stop locker + DC rowhouses</text>

    <rect x="20" y="628" width="110" height="88" class="surface card"/>
    <rect x="140" y="628" width="110" height="88" class="surface card"/>
    <rect x="260" y="628" width="110" height="88" class="surface card"/>
    <text x="34" y="662" class="title navy">17</text>
    <text x="34" y="688" class="small muted">Neighborhood pit stops</text>
    <text x="154" y="662" class="title navy">Temp-controlled</text>
    <text x="154" y="688" class="small muted">Meal storage ensuring freshness</text>
    <text x="274" y="662" class="title navy">1 mi</text>
    <text x="274" y="688" class="small muted">Typical pickup reach</text>

    <rect x="20" y="736" width="350" height="76" class="soft card"/>
    <text x="34" y="764" class="bodyBold navy">2 hrs guaranteed delivery</text>
    <text x="34" y="788" class="body muted">Fresh produce and insulated trays routed safely into neighborhood pit stops.</text>
  </g>

