    <rect x="118" y="260" width="70" height="24" class="surface pill"/><text x="132" y="276" class="small navy">15g fiber</text>
    <rect x="194" y="260" width="74" height="24" class="surface pill"/><text x="208" y="276" class="small navy">665 cal</text>
    <rect x="274" y="260" width="78" height="24" class="surface pill"/><text x="286" y="276" class="small navy">60g target</text>

    <rect x="20" y="316" width="168" height="242" class="surface card"/>
    <rect x="202" y="316" width="168" height="242" class="surface card"/>
    <rect x="20" y="574" width="168" height="242" class="surface card"/>
    <rect x="202" y="574" width="168" height="242" class="surface card"/>
    <text x="44" y="340" class="bodyBold navy">Apple &amp; peanut butter snack</text>
    <text x="44" y="358" class="small muted">1 apple + 1.5 oz peanut butter</text>
    <text x="44" y="392" class="small teal">Healthy snack</text>
    <text x="44" y="426" class="bodyBold navy">$1.49</text>
    <circle cx="160" cy="522" r="14" class="blue"/><text x="155" y="527" class="bodyBold white">+</text>
    <text x="224" y="340" class="bodyBold navy">Greek yogurt parfait</text>
    <text x="224" y="358" class="small muted">7 oz cup • 1 cup</text>
    <text x="224" y="392" class="small teal">High protein</text>
    <text x="224" y="426" class="bodyBold navy">$1.79</text>
  </g>

  <!-- Screen 3 -->
  <g transform="translate(900 40)">
