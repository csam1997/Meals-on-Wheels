    <rect x="284" y="152" width="86" height="32" class="surface pill"/><text x="304" y="172" class="small muted">Protein</text>

    <rect x="20" y="200" width="350" height="90" class="soft card"/>
    <text x="34" y="226" class="bodyBold navy">Nutrition coach</text>
    <text x="34" y="248" class="body muted">Protein is running low. Add salmon, tuna, turkey, eggs, tofu, or lentils.</text>
