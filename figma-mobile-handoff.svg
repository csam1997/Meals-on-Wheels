    <text x="34" y="210" class="small muted">1 apple + 1.5 oz peanut butter</text>
    <rect x="34" y="226" width="84" height="28" class="surface pill"/><text x="54" y="244" class="small navy">Qty 1</text>
    <text x="292" y="246" class="bodyBold navy">$1.49</text>
    <text x="34" y="266" class="small teal">Remove</text>

    <rect x="20" y="302" width="350" height="198" class="surface card"/>
