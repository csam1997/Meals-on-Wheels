    <text x="34" y="232" class="body muted">EBT and subsidy friendly • Vegan, vegetarian, and non-veg options</text>
    <text x="34" y="254" class="body muted">Student pricing available with verified .edu logins</text>

    <rect x="20" y="318" width="82" height="32" rx="16" class="blue"/><text x="37" y="338" class="small white">Students</text>
    <rect x="110" y="318" width="76" height="32" class="surface pill"/><text x="130" y="338" class="small muted">Seniors</text>
    <rect x="194" y="318" width="110" height="32" class="surface pill"/><text x="216" y="338" class="small muted">Family support</text>

    <rect x="20" y="372" width="350" height="138" class="surface card"/>
